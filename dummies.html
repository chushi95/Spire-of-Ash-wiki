<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木桩测试 - Spire of Ash Wiki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            color: #c9b896;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2418 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #8b6914;
        }
        .header h1 {
            font-size: 2.5em;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .header p {
            color: #8b7355;
            margin-top: 10px;
        }
        .nav {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid #3d3220;
        }
        .nav a {
            color: #a89f91;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .nav a:hover {
            background: #2d2418;
            border-color: #8b6914;
            color: #d4af37;
        }
        .nav a.active {
            background: #3d3220;
            border-color: #d4af37;
            color: #d4af37;
        }
        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .test-section {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid #3d3220;
        }
        .test-section h2 {
            color: #d4af37;
            margin-bottom: 20px;
            text-align: center;
        }
        .control-group {
            background: #2d2418;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #3d3220;
            margin-bottom: 20px;
        }
        .control-group h3 {
            color: #d4af37;
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #a89f91;
        }
        .control-group select {
            width: 100%;
            padding: 10px;
            background: #0d0d0d;
            border: 1px solid #3d3220;
            color: #c9b896;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary {
            background: #8b6914;
            color: #0d0d0d;
        }
        .btn-primary:hover {
            background: #d4af37;
        }
        .data-panel {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #3d3220;
            margin: 20px 0;
        }
        .data-panel h3 {
            color: #d4af37;
            margin-bottom: 15px;
            text-align: center;
        }
        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2d2418;
        }
        .data-label { color: #a89f91; }
        .data-value { color: #c9b896; font-weight: bold; }
        .data-value.positive { color: #4caf50; }
        .dummy-display {
            background: #2d2418;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid #3d3220;
            text-align: center;
        }
        .dummy-visual {
            width: 200px;
            height: 300px;
            background: #3d3220;
            border: 2px solid #8b6914;
            border-radius: 10px;
            margin: 0 auto 20px;
            position: relative;
            overflow: hidden;
        }
        .dummy-health {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(to top, #4caf50, #81c784);
            transition: height 0.5s ease;
        }
        .dummy-health-bar {
            width: 100%;
            height: 20px;
            background: #3d3220;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .dummy-health-fill {
            height: 100%;
            background: linear-gradient(to right, #f44336, #ff5722);
            transition: width 0.5s ease;
        }
        .damage-text {
            position: absolute;
            color: #ff5722;
            font-weight: bold;
            animation: damageFloat 1s ease-out forwards;
        }
        @keyframes damageFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .result-item {
            background: #2d2418;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #8b6914;
        }
        .result-item h3 {
            color: #d4af37;
            margin-bottom: 10px;
        }
        .result-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #c9b896;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Spire of Ash Wiki</h1>
        <p>木桩测试系统</p>
    </div>

    <div class="nav">
        <a href="index.html">首页</a>
        <a href="characters.html">角色</a>
        <a href="items.html">物品</a>
        <a href="guides.html">攻略</a>
        <a href="dummies.html" class="active">木桩</a>
    </div>

    <div class="container">
        <div class="test-section">
            <h2>角色伤害测试</h2>
            
            <div class="control-group">
                <h3>选择角色（最多5个）</h3>
                <label for="character1">角色 1</label>
                <select id="character1">
                    <option value="">选择角色</option>
                    <option value="blood-flag-warlord">血旗战士</option>
                    <option value="void-summoner">虚空召唤者</option>
                </select>
                <label for="character2">角色 2</label>
                <select id="character2">
                    <option value="">选择角色</option>
                    <option value="blood-flag-warlord">血旗战士</option>
                    <option value="void-summoner">虚空召唤者</option>
                </select>
                <label for="character3">角色 3</label>
                <select id="character3">
                    <option value="">选择角色</option>
                    <option value="blood-flag-warlord">血旗战士</option>
                    <option value="void-summoner">虚空召唤者</option>
                </select>
                <label for="character4">角色 4</label>
                <select id="character4">
                    <option value="">选择角色</option>
                    <option value="blood-flag-warlord">血旗战士</option>
                    <option value="void-summoner">虚空召唤者</option>
                </select>
                <label for="character5">角色 5</label>
                <select id="character5">
                    <option value="">选择角色</option>
                    <option value="blood-flag-warlord">血旗战士</option>
                    <option value="void-summoner">虚空召唤者</option>
                </select>
            </div>

            <div class="control-group">
                <h3>测试设置</h3>
                <label for="level">里程碑等级</label>
                <select id="level">
                    <option value="1">1级</option>
                    <option value="15">15级</option>
                    <option value="30">30级</option>
                    <option value="45">45级</option>
                    <option value="60" selected>60级</option>
                    <option value="75">75级</option>
                    <option value="90">90级</option>
                </select>
                
                <label for="dummyType">木桩类型</label>
                <select id="dummyType">
                    <option value="single">1目标</option>
                    <option value="multi">5目标</option>
                </select>
            </div>

            <div style="text-align: center;">
                <button class="btn btn-primary" onclick="startTest()">开始测试</button>
                <button class="btn" onclick="resetTest()" style="background: #3d3220; color: #c9b896; border: 1px solid #8b6914;">重置</button>
            </div>
        </div>

        <div class="data-panel">
            <h3>当前数据</h3>
            <div id="characterData" style="display: flex; flex-wrap: wrap; gap: 15px;">
                <div class="data-item">
                    <span class="data-label">角色名称</span>
                    <span class="data-value">未选择</span>
                </div>
                <div class="data-item">
                    <span class="data-label">里程碑名称</span>
                    <span class="data-value">未选择</span>
                </div>
                <div class="data-item">
                    <span class="data-label">基础DPS</span>
                    <span class="data-value">0</span>
                </div>
                <div class="data-item">
                    <span class="data-label">生命值</span>
                    <span class="data-value">0</span>
                </div>
            </div>
        </div>

        <div class="dummy-display">
            <h3>测试木桩</h3>
            <div class="dummy-visual">
                <div class="dummy-health" id="dummyHealth"></div>
            </div>
            <div class="dummy-health-bar">
                <div class="dummy-health-fill" id="dummyHealthFill" style="width: 100%"></div>
            </div>
            <p id="dummyStatus">木桩状态: 就绪</p>
        </div>

        <div class="data-panel">
            <h3>测试结果</h3>
            <div class="result-item">
                <h3>总伤害</h3>
                <div class="result-value" id="totalDamage">0</div>
            </div>
            <div class="result-item">
                <h3>DPS</h3>
                <div class="result-value" id="dps">0</div>
            </div>
            <div class="result-item">
                <h3>测试时间</h3>
                <div class="result-value" id="testTime">0s</div>
            </div>
        </div>
    </div>

    <script>
        // 里程碑数据
        const milestoneData = {
            "blood-flag-warlord": {
                name: "血旗战士",
                milestones: {
                    1: { name: "战争标准", dps: 25, survival: { health: 358 } },
                    15: { name: "疯狂节奏", dps: 29, survival: { health: 390 } },
                    30: { name: "打开静脉", dps: 34, survival: { health: 390 } },
                    45: { name: "旗帜风暴", dps: 41, survival: { health: 390 } },
                    60: { name: "共同的屠杀", dps: 51, survival: { health: 390 } },
                    75: { name: "深红势头", dps: 61, survival: { health: 441 } },
                    90: { name: "屠宰场旗帜", dps: 76, survival: { health: 441 } }
                }
            },
            "void-summoner": {
                name: "虚空召唤者",
                milestones: {
                    1: { name: "虚空裂隙", dps: 15, survival: { health: 320 } },
                    15: { name: "重力节奏", dps: 18, survival: { health: 320 } },
                    30: { name: "粉碎轨道", dps: 21, survival: { health: 320 } },
                    45: { name: "曝光螺旋", dps: 24, survival: { health: 320 } },
                    60: { name: "事件压缩", dps: 28, survival: { health: 320 } },
                    75: { name: "恐惧频率", dps: 34, survival: { health: 320 } },
                    90: { name: "奇异崩溃", dps: 40, survival: { health: 320 } }
                }
            }
        };

        let testRunning = false;
        let testStartTime = 0;
        let totalDamage = 0;
        let currentDummyHealth = 0;

        // 更新数据显示
        function updateDisplay() {
            try {
                const level = document.getElementById('level').value;
                const characters = [];
                
                // 获取所有选择的角色
                for (let i = 1; i <= 5; i++) {
                    const characterId = document.getElementById(`character${i}`).value;
                    if (characterId && milestoneData[characterId] && milestoneData[characterId].milestones[level]) {
                        characters.push({
                            data: milestoneData[characterId],
                            milestone: milestoneData[characterId].milestones[level]
                        });
                    }
                }
                
                const characterDataContainer = document.getElementById('characterData');
                characterDataContainer.innerHTML = '';
                
                if (characters.length > 0) {
                    // 为每个角色创建数据块
                    characters.forEach((character, index) => {
                        if (character && character.data && character.milestone) {
                            const characterBlock = document.createElement('div');
                            characterBlock.style.flex = '1 1 300px';
                            characterBlock.style.minWidth = '200px';
                            characterBlock.style.padding = '15px';
                            characterBlock.style.backgroundColor = '#2d2418';
                            characterBlock.style.borderRadius = '8px';
                            characterBlock.style.border = '1px solid #3d3220';
                            
                            const title = document.createElement('h4');
                            title.textContent = `角色 ${index + 1}: ${character.data.name || '未知角色'}`;
                            title.style.color = '#d4af37';
                            title.style.marginBottom = '10px';
                            title.style.fontSize = '0.9em';
                            
                            const dataItems = document.createElement('div');
                            
                            const milestoneItem = document.createElement('div');
                            milestoneItem.className = 'data-item';
                            milestoneItem.innerHTML = `
                                <span class="data-label">里程碑</span>
                                <span class="data-value">${character.milestone.name || '未知'} (${level}级)</span>
                            `;
                            
                            const dpsItem = document.createElement('div');
                            dpsItem.className = 'data-item';
                            dpsItem.innerHTML = `
                                <span class="data-label">DPS</span>
                                <span class="data-value">${character.milestone.dps || 0}</span>
                            `;
                            
                            const healthItem = document.createElement('div');
                            healthItem.className = 'data-item';
                            healthItem.innerHTML = `
                                <span class="data-label">生命值</span>
                                <span class="data-value">${character.milestone.survival && character.milestone.survival.health ? character.milestone.survival.health : 0}</span>
                            `;
                            
                            dataItems.appendChild(milestoneItem);
                            dataItems.appendChild(dpsItem);
                            dataItems.appendChild(healthItem);
                            
                            characterBlock.appendChild(title);
                            characterBlock.appendChild(dataItems);
                            characterDataContainer.appendChild(characterBlock);
                        }
                    });
                    
                    // 计算总DPS和平均生命值
                    let totalDPS = 0;
                    let totalHealth = 0;
                    let validCharacters = 0;
                    
                    characters.forEach(character => {
                        if (character && character.milestone) {
                            totalDPS += character.milestone.dps || 0;
                            totalHealth += character.milestone.survival && character.milestone.survival.health ? character.milestone.survival.health : 0;
                            validCharacters++;
                        }
                    });
                    
                    const avgHealth = validCharacters > 0 ? Math.round(totalHealth / validCharacters) : 0;
                    
                    // 添加总计数据
                    const totalBlock = document.createElement('div');
                    totalBlock.style.flex = '1 1 100%';
                    totalBlock.style.marginTop = '15px';
                    totalBlock.style.padding = '15px';
                    totalBlock.style.backgroundColor = '#3d3220';
                    totalBlock.style.borderRadius = '8px';
                    totalBlock.style.border = '1px solid #8b6914';
                    
                    const totalTitle = document.createElement('h4');
                    totalTitle.textContent = '总计';
                    totalTitle.style.color = '#d4af37';
                    totalTitle.style.marginBottom = '10px';
                    totalTitle.style.fontSize = '1em';
                    
                    const totalItems = document.createElement('div');
                    totalItems.style.display = 'flex';
                    totalItems.style.gap = '20px';
                    
                    const totalDpsItem = document.createElement('div');
                    totalDpsItem.className = 'data-item';
                    totalDpsItem.style.flex = '1';
                    totalDpsItem.innerHTML = `
                        <span class="data-label">总DPS</span>
                        <span class="data-value positive">${totalDPS}</span>
                    `;
                    
                    const totalHealthItem = document.createElement('div');
                    totalHealthItem.className = 'data-item';
                    totalHealthItem.style.flex = '1';
                    totalHealthItem.innerHTML = `
                        <span class="data-label">平均生命值</span>
                        <span class="data-value positive">${avgHealth}</span>
                    `;
                    
                    totalItems.appendChild(totalDpsItem);
                    totalItems.appendChild(totalHealthItem);
                    
                    totalBlock.appendChild(totalTitle);
                    totalBlock.appendChild(totalItems);
                    characterDataContainer.appendChild(totalBlock);
                } else {
                    // 显示未选择状态
                    const emptyState = document.createElement('div');
                    emptyState.style.flex = '1 1 100%';
                    emptyState.innerHTML = `
                        <div class="data-item">
                            <span class="data-label">角色名称</span>
                            <span class="data-value">未选择</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">里程碑名称</span>
                            <span class="data-value">未选择</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">基础DPS</span>
                            <span class="data-value">0</span>
                        </div>
                        <div class="data-item">
                            <span class="data-label">生命值</span>
                            <span class="data-value">0</span>
                        </div>
                    `;
                    characterDataContainer.appendChild(emptyState);
                }
            } catch (error) {
                console.error('更新数据显示失败:', error);
                const characterDataContainer = document.getElementById('characterData');
                characterDataContainer.innerHTML = '<div style="color: #f44336; text-align: center; padding: 20px;">数据显示失败，请检查控制台错误信息</div>';
            }
        }

        // 开始测试
        function startTest() {
            try {
                if (testRunning) {
                    alert('测试已在运行中');
                    return;
                }
                
                const level = document.getElementById('level').value;
                const dummyType = document.getElementById('dummyType').value;
                
                // 获取所有选择的角色
                const characters = [];
                for (let i = 1; i <= 5; i++) {
                    const characterId = document.getElementById(`character${i}`).value;
                    if (characterId && milestoneData[characterId] && milestoneData[characterId].milestones[level]) {
                        characters.push({
                            id: characterId,
                            data: milestoneData[characterId],
                            milestone: milestoneData[characterId].milestones[level]
                        });
                    }
                }
                
                if (characters.length === 0) {
                    alert('请至少选择一个角色');
                    return;
                }
                
                const targetCount = dummyType === 'multi' ? 5 : 1;
                
                currentDummyHealth = 100000 * targetCount;
                testRunning = true;
                testStartTime = Date.now();
                totalDamage = 0;
                
                document.getElementById('dummyHealth').style.height = '100%';
                document.getElementById('dummyHealthFill').style.width = '100%';
                document.getElementById('dummyStatus').textContent = `木桩状态: 测试中... (${targetCount}目标, ${characters.length}角色)`;
                document.getElementById('totalDamage').textContent = '0';
                document.getElementById('dps').textContent = '0';
                document.getElementById('testTime').textContent = '0s';
                
                // 开始测试循环
                runTest(characters, targetCount);
            } catch (error) {
                console.error('测试启动失败:', error);
                alert('测试启动失败，请检查控制台错误信息');
                testRunning = false;
            }
        }

        // 运行测试
        function runTest(characters, targetCount) {
            if (!testRunning) return;
            
            try {
                let totalTeamDamage = 0;
                
                // 计算所有角色的伤害
                characters.forEach(character => {
                    if (character && character.milestone && typeof character.milestone.dps === 'number') {
                        let damage = character.milestone.dps;
                        if (targetCount > 1) {
                            damage = damage * (1 + (targetCount - 1) * 0.5);
                        }
                        totalTeamDamage += damage;
                    }
                });
                
                totalDamage += totalTeamDamage;
                currentDummyHealth -= totalTeamDamage;
                
                // 更新UI
                const maxHealth = 100000 * targetCount;
                const healthPercentage = Math.max(0, currentDummyHealth / maxHealth) * 100;
                document.getElementById('dummyHealth').style.height = `${healthPercentage}%`;
                document.getElementById('dummyHealthFill').style.width = `${healthPercentage}%`;
                
                // 显示伤害数字
                showDamageNumber(totalTeamDamage);
                
                // 更新结果
                const testTime = (Date.now() - testStartTime) / 1000;
                const dps = totalDamage / testTime;
                
                document.getElementById('totalDamage').textContent = Math.round(totalDamage);
                document.getElementById('dps').textContent = Math.round(dps);
                document.getElementById('testTime').textContent = `${testTime.toFixed(1)}s`;
                
                // 检查木桩是否被击败
                if (currentDummyHealth <= 0) {
                    document.getElementById('dummyStatus').textContent = `木桩状态: 已击败 (${targetCount}目标, ${characters.length}角色)`;
                    testRunning = false;
                    return;
                }
                
                // 继续测试
                setTimeout(() => runTest(characters, targetCount), 1000);
            } catch (error) {
                console.error('测试运行失败:', error);
                alert('测试运行失败，请检查控制台错误信息');
                testRunning = false;
            }
        }

        // 显示伤害数字
        function showDamageNumber(damage) {
            try {
                const dummyVisual = document.querySelector('.dummy-visual');
                const damageText = document.createElement('div');
                damageText.className = 'damage-text';
                damageText.textContent = `+${Math.round(damage)}`;
                damageText.style.left = `${Math.random() * 80 + 10}%`;
                damageText.style.top = `${Math.random() * 50 + 20}%`;
                dummyVisual.appendChild(damageText);
                
                setTimeout(() => {
                    if (damageText.parentNode) {
                        damageText.parentNode.removeChild(damageText);
                    }
                }, 1000);
            } catch (error) {
                console.error('显示伤害数字失败:', error);
            }
        }

        // 重置测试
        function resetTest() {
            try {
                testRunning = false;
                document.getElementById('dummyHealth').style.height = '100%';
                document.getElementById('dummyHealthFill').style.width = '100%';
                document.getElementById('dummyStatus').textContent = '木桩状态: 就绪';
                document.getElementById('totalDamage').textContent = '0';
                document.getElementById('dps').textContent = '0';
                document.getElementById('testTime').textContent = '0s';
            } catch (error) {
                console.error('重置测试失败:', error);
            }
        }

        // 监听选择变化
        for (let i = 1; i <= 5; i++) {
            document.getElementById(`character${i}`).addEventListener('change', updateDisplay);
        }
        document.getElementById('level').addEventListener('change', updateDisplay);
        
        // 初始化
        updateDisplay();
    </script>
</body>
</html>
